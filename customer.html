<!--
Customer Kiosk Interface Placeholder

Purpose:
- This page will later serve customers using a self-service kiosk.
- User focus: casual end user
- Input modality: touchscreen
- Place setting: publicly viewable large kiosk of full menu items in the restaurant lobby space

Requirements reminders:
- This page should NOT link back to portal.html/index.html once implemented.
- This page should NOT link to manager, cashier, or menu board interfaces.
- This page must be visually and interactively distinct from the cashier interface.
- This page must address accessibility requirements carefully.
- This page will likely host beyond-the-requirements customer features.

Suggested future sections:
- Welcome / ordering prompt
- Menu browsing categories
- Item detail and customization flow
- Cart and checkout flow
- Translation, weather, assistant, or other external API touchpoints if relevant

Ownership suggestion:

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Kiosk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 18px; }
    .hidden { display: none; }

    /* Welcome */
    #welcome-screen {
      display: flex;
      position: fixed;
      inset: 0;
      background: #fff;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }
    #welcome-screen.hidden { display: none; }
    #welcome-screen h1 { margin-bottom: 16px; }
    #welcome-screen p { margin-bottom: 24px; }

    /* App */
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: 16px; border-bottom: 1px solid #000; }
    main { padding: 16px; }

    /* Category tabs */
    #category-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

    /* Menu grid */
    #menu-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .menu-card { border: 1px solid #000; padding: 12px; text-align: center; }
    .menu-card button { width: 100%; padding: 10px; margin-top: 8px; }

    /* Modal */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
    #modal-overlay.open { display: flex; }
    #modal { background: #fff; padding: 24px; width: 90%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
    #modal h2 { margin-bottom: 6px; }
    #modal-price { margin-bottom: 18px; }
    .option-group { margin-bottom: 14px; }
    .option-group label { display: block; font-weight: bold; margin-bottom: 6px; }
    .option-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .option-btn { padding: 10px 14px; border: 1px solid #000; background: #fff; }
    .option-btn.selected { background: #000; color: #fff; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 12px; }

    /* Touch-friendly */
    button { font-size: 1rem; cursor: pointer; min-height: 44px; min-width: 44px; }
  </style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="welcome-screen" role="main" aria-label="Welcome screen">
  <h1>Welcome</h1>
  <p>Tap below to start your order</p>
  <button id="btn-start-order">Tap to Order</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <header>
    <h1>Customer Kiosk</h1>
  </header>
  <main>
    <div id="category-tabs" role="tablist" aria-label="Menu categories"></div>
    <div id="menu-items" role="list" aria-label="Menu items"></div>
  </main>
</div>

<!-- CUSTOMIZATION MODAL -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-price"></p>

    <div class="option-group">
      <label id="size-label">Size</label>
      <div class="option-buttons" id="size-options" role="group" aria-labelledby="size-label"></div>
    </div>

    <div class="option-group">
      <label id="ice-label">Ice Level</label>
      <div class="option-buttons" id="ice-options" role="group" aria-labelledby="ice-label"></div>
    </div>

    <div class="option-group">
      <label id="sugar-label">Sugar Level</label>
      <div class="option-buttons" id="sugar-options" role="group" aria-labelledby="sugar-label"></div>
    </div>

    <div class="option-group">
      <label id="toppings-label">Toppings (optional)</label>
      <div class="option-buttons" id="toppings-options" role="group" aria-labelledby="toppings-label"></div>
    </div>

    <div class="modal-actions">
      <button id="btn-cancel">Cancel</button>
      <button id="btn-add-to-cart">Add to Cart</button>
    </div>
  </div>
</div>

<script>
  // ===================== DATA =====================

  const MENU = {
    "Milk Tea": [
      { id: 8,  name: "Brown Sugar Milk Tea",         price: 6.00 },
      { id: 9,  name: "Taro Milk Tea",                price: 5.75 },
      { id: 10, name: "Matcha Milk Tea",              price: 5.75 },
      { id: 11, name: "Thai Tea",                     price: 5.75 },
      { id: 12, name: "Honeydew Milk Tea",            price: 5.75 },
      { id: 13, name: "Strawberry Milk Tea",          price: 5.75 },
      { id: 14, name: "Coconut Milk Tea",             price: 5.75 },
      { id: 15, name: "Coffee Milk Tea",              price: 5.75 },
      { id: 16, name: "Almond Milk Tea",              price: 5.75 },
      { id: 17, name: "Rose Milk Tea",                price: 5.75 },
      { id: 18, name: "Lavender Milk Tea",            price: 5.75 },
      { id: 19, name: "Java Milk Tea",                price: 5.75 },
      { id: 20, name: "Classic Milk Tea",             price: 5.50 },
      { id: 21, name: "Bunny Carrot Cake Milk Tea",   price: 6.25 },
      { id: 22, name: "Easter Special Fruit Tea",     price: 6.25 },
      { id: 23, name: "Christmas Cookie Tea",         price: 6.25 },
      { id: 24, name: "Turkey Milk Tea",              price: 6.25 },
      { id: 25, name: "Christmas Cookie Milk Tea",    price: 6.25 },
    ],
    "Fruit Tea": [
      { id: 1,  name: "Mango Green Tea",              price: 5.50 },
      { id: 2,  name: "Passion Fruit Tea",            price: 5.50 },
      { id: 3,  name: "Lychee Black Tea",             price: 5.50 },
      { id: 4,  name: "Peach Oolong Tea",             price: 5.50 },
      { id: 5,  name: "Wintermelon Tea",              price: 5.50 },
      { id: 6,  name: "Fruit Tea Combo",              price: 5.75 },
      { id: 7,  name: "Peppermint",                   price: 5.50 },
    ],
    "Tea": [
      { id: 26, name: "Jasmine Green Tea",            price: 5.00 },
      { id: 27, name: "Oreo Milk Tea",                price: 5.75 },
      { id: 28, name: "Backend Milk Tea",             price: 5.75 },
    ],
    "Specialty": [
      { id: 29, name: "Cheese Foam Tea",              price: 6.75 },
    ]
  };

  const SIZES    = ["Regular", "Large"];
  const ICE      = ["No Ice", "Less Ice", "Regular Ice", "Extra Ice"];
  const SUGAR    = ["0% Sugar", "25% Sugar", "50% Sugar", "75% Sugar", "100% Sugar"];
  const TOPPINGS = [
    { name: "Tapioca Pearls", price: 0.50 },
    { name: "Mini Pearls",    price: 0.50 },
    { name: "Popping Boba",   price: 0.75 },
    { name: "Grass Jelly",    price: 0.50 },
    { name: "Aloe Vera",      price: 0.50 },
    { name: "Pudding",        price: 0.75 },
  ];

  const SIZE_UPCHARGE = { "Regular": 0, "Large": 0.75 };

  // ===================== STATE =====================

  let currentItem = null;
  let selectedOptions = {};

  // ===================== WELCOME =====================

  document.getElementById("btn-start-order").addEventListener("click", () => {
    document.getElementById("welcome-screen").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  });

  // ===================== MENU =====================

  buildCategoryTabs();
  showCategory(Object.keys(MENU)[0]);

  function buildCategoryTabs() {
    const tabs = document.getElementById("category-tabs");
    Object.keys(MENU).forEach((cat, i) => {
      const btn = document.createElement("button");
      btn.textContent = cat;
      btn.setAttribute("role", "tab");
      btn.setAttribute("aria-selected", i === 0 ? "true" : "false");
      btn.addEventListener("click", () => {
        document.querySelectorAll("#category-tabs button").forEach(b => b.setAttribute("aria-selected", "false"));
        btn.setAttribute("aria-selected", "true");
        showCategory(cat);
      });
      tabs.appendChild(btn);
    });
  }

  function showCategory(category) {
    const container = document.getElementById("menu-items");
    container.innerHTML = "";
    MENU[category].forEach(item => {
      const card = document.createElement("div");
      card.className = "menu-card";
      card.setAttribute("role", "listitem");
      card.innerHTML = `
        <h3>${item.name}</h3>
        <p>$${item.price.toFixed(2)}</p>
        <button aria-label="Customize and add ${item.name} to cart">Add</button>
      `;
      card.querySelector("button").addEventListener("click", () => openModal(item));
      container.appendChild(card);
    });
  }

  // ===================== MODAL =====================

  function openModal(item) {
    currentItem = item;
    selectedOptions = { size: "Regular", ice: "Regular Ice", sugar: "100% Sugar", toppings: [] };

    document.getElementById("modal-title").textContent = item.name;
    updateModalPrice();
    renderOptionButtons("size-options",     SIZES,                                    "size",     false);
    renderOptionButtons("ice-options",      ICE,                                      "ice",      false);
    renderOptionButtons("sugar-options",    SUGAR,                                    "sugar",    false);
    renderOptionButtons("toppings-options", TOPPINGS.map(t => `${t.name} (+$${t.price.toFixed(2)})`), "toppings", true);

    document.getElementById("modal-overlay").classList.add("open");
    document.getElementById("btn-cancel").focus();
  }

  function renderOptionButtons(containerId, options, type, multi) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      const isSelected = multi
        ? selectedOptions.toppings.includes(opt)
        : selectedOptions[type] === opt;
      btn.classList.toggle("selected", isSelected);
      btn.setAttribute("aria-pressed", isSelected ? "true" : "false");
      btn.addEventListener("click", () => {
        if (multi) {
          const idx = selectedOptions.toppings.indexOf(opt);
          if (idx === -1) selectedOptions.toppings.push(opt);
          else selectedOptions.toppings.splice(idx, 1);
        } else {
          selectedOptions[type] = opt;
        }
        renderOptionButtons(containerId, options, type, multi);
        updateModalPrice();
      });
      container.appendChild(btn);
    });
  }

  function getToppingPrice(label) {
    const match = TOPPINGS.find(t => label.startsWith(t.name));
    return match ? match.price : 0;
  }

  function updateModalPrice() {
    const toppingTotal = selectedOptions.toppings.reduce((sum, t) => sum + getToppingPrice(t), 0);
    const total = currentItem.price + (SIZE_UPCHARGE[selectedOptions.size] || 0) + toppingTotal;
    document.getElementById("modal-price").textContent = `$${total.toFixed(2)} — ${selectedOptions.size}`;
  }

  document.getElementById("btn-cancel").addEventListener("click", closeModal);
  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    currentItem = null;
  }

  // ===================== ADD TO CART =====================

  document.getElementById("btn-add-to-cart").addEventListener("click", () => {
    // TODO: add to cart on next commit
    alert("Cart coming soon!");
    closeModal();
  });
</script>
</body>
</html>
