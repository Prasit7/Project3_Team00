Purpose:

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kungfu Boba | Cashier POS</title>
    <link rel="stylesheet" href="cashier.css" />
  </head>
  <body>
    <div class="cashier-app">
      <header class="pos-header">
        <div>
          <p class="eyebrow">Kungfu Boba Register</p>
          <h1>Cashier Interface</h1>
        </div>
        <div class="shift-meta">
          <span class="meta-pill" id="ticket-id">Ticket #1001</span>
          <span class="meta-pill" id="clock">--:-- --</span>
        </div>
      </header>

      <main class="pos-layout">
        <section class="order-panel" aria-labelledby="menu-heading">
          <div class="panel-heading">
            <h2 id="menu-heading">Quick Add Menu</h2>
            <input
              id="item-search"
              type="search"
              placeholder="Search drink..."
              aria-label="Search menu items"
            />
          </div>

          <div class="menu-grid" id="menu-grid"></div>

          <div class="shortcut-row" aria-label="Frequent actions">
            <button data-action="hold" type="button">Hold Order</button>
          </div>
        </section>

        <aside class="cart-panel" aria-labelledby="cart-heading">
          <div class="panel-heading">
            <h2 id="cart-heading">Current Ticket</h2>
          </div>

          <ul class="cart-list" id="cart-list" aria-live="polite">
            <li class="empty-state">No items yet. Tap a drink to begin.</li>
          </ul>

          <div class="discount-controls">
            <label for="discount-input">Discount %</label>
            <div class="discount-row">
              <input
                id="discount-input"
                type="number"
                min="0"
                max="100"
                step="0.01"
                placeholder="0"
              />
              <button id="apply-discount" type="button">Apply</button>
              <button id="clear-discount" type="button">Clear</button>
            </div>
          </div>

          <div class="totals">
            <p><span>Subtotal</span><span id="subtotal">$0.00</span></p>
            <p><span>Discount</span><span id="discount-amount">-$0.00</span></p>
            <p><span>Tax (8.25%)</span><span id="tax">$0.00</span></p>
            <p class="grand-total"><span>Total</span><span id="total">$0.00</span></p>
          </div>

          <div class="payment-grid">
            <button type="button">Cash</button>
            <button type="button">Card</button>
            <button type="button">Mobile Pay</button>
            <button id="clear-ticket" type="button">Clear Ticket</button>
          </div>
        </aside>
      </main>
    </div>

    <div id="customize-modal" class="modal-overlay" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-drink-name">
        <h3 id="modal-drink-name">Customize Drink</h3>
        <p class="modal-base">Base: <span id="modal-base-price">$0.00</span></p>

        <label class="field-label" for="size-select">Size</label>
        <select id="size-select">
          <option value="Regular">Regular</option>
          <option value="Large">Large (+$0.75)</option>
        </select>

        <label class="field-label" for="ice-select">Ice Level</label>
        <select id="ice-select">
          <option value="No Ice">No Ice</option>
          <option value="Less Ice">Less Ice</option>
          <option value="Regular Ice" selected>Regular Ice</option>
          <option value="Extra Ice">Extra Ice</option>
        </select>

        <label class="field-label" for="sugar-select">Sugar Level</label>
        <select id="sugar-select">
          <option value="0%">0%</option>
          <option value="25%">25%</option>
          <option value="50%">50%</option>
          <option value="75%">75%</option>
          <option value="100%" selected>100%</option>
        </select>

        <p class="field-label">Toppings</p>
        <div id="toppings-list" class="toppings-list"></div>

        <p class="preview-total">Item Total: <strong id="preview-item-total">$0.00</strong></p>

        <div class="modal-actions">
          <button id="cancel-custom-item" type="button">Cancel</button>
          <button id="add-custom-item" type="button">Add to Ticket</button>
        </div>
      </div>
    </div>

    <script src="cashier.js"></script>
  </body>
</html>
