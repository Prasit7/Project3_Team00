<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Sugar Boba | Menu Board</title>

 
  <link rel="stylesheet" href="menu-board.css" />
  
</head>

<body>


  <!-- Banner -->
  <header class="board-header">
    <div class="header-brand">
      <p class="eyebrow">Artisan Bubble Tea</p>
      <h1>Zero Sugar Boba</h1>
    </div>
    <div class="header-meta">
      <span class="meta-pill" id="clock">--:--</span>
      <span class="meta-pill now-serving" data-i18n="nowServing">Now Serving</span>
    </div>
  </header>

  <section class="status-banner">
    <p id="board-status">Loading menu from database...</p>
  </section>

  <div class="ticker-wrap">
    <div class="ticker-track" id="ticker-track">
      <span>Loading menu...</span>
    </div>
  </div>

  <main class="board-main">

    <section class="menu-column">
      <div class="column-header">
        <span class="cat-icon">🧋</span>
        <h2 data-i18n="milkTeas">Milk Teas</h2>
      </div>
      <ul class="item-list" id="milk-tea-list"></ul>
    </section>

    <section class="menu-column">
      <div class="column-header">
        <span class="cat-icon">🍓</span>
        <h2 data-i18n="fruitTeas">Fruit Teas</h2>
      </div>
      <ul class="item-list" id="fruit-tea-list"></ul>
    </section>

    <section class="menu-column">
      <div class="column-header">
        <span class="cat-icon">🍵</span>
        <h2 data-i18n="teaSpecialty">Tea & Specialty</h2>
      </div>
      <ul class="item-list" id="specialty-list"></ul>
    </section>

  </main>

  <footer class="board-footer">
    <div class="opt-group">
      <p class="opt-label">Sugar Level</p>
      <div id="sugar-options"></div>
    </div>
    <div class="opt-group">
      <p class="opt-label">Ice Level</p>
      <div id="ice-options"></div>
    </div>
    <div class="opt-group">
      <p class="opt-label">Toppings</p>
      <div id="topping-options"></div>
    </div>
  </footer>

<script src="translations.js" defer></script>
<script src="accessibility.js" defer></script>

<script>
const boardStatus = document.getElementById("board-status");
const tickerTrack = document.getElementById("ticker-track");

function updateClock() {
  const now = new Date();
  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2, "0");
  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12 || 12;
  document.getElementById("clock").textContent = `${hours}:${minutes} ${ampm}`;
}
updateClock();
setInterval(updateClock, 60000);

function formatMoney(v) {
  return `$${Number(v || 0).toFixed(2)}`;
}

function renderItems(id, items) {
  const list = document.getElementById(id);
  list.innerHTML = items.length
    ? items.map(i => `
        <li class="menu-item">
          <span class="item-name">${i.name}</span>
          <span class="item-price">${formatMoney(i.price)}</span>
        </li>
      `).join("")
    : "<li>No items</li>";
}

function categorize(items) {
  const milk = [], fruit = [], spec = [];
  items.forEach(i => {
    const c = (i.category || "").toLowerCase();
    if (c.includes("milk")) milk.push(i);
    else if (c.includes("fruit") || c.includes("tea")) fruit.push(i);
    else spec.push(i);
  });
  return { milk, fruit, spec };
}

async function loadMenu() {
  try {
    const res = await fetch("/api/menu-items"); // ✅ YOUR DB
    const items = await res.json();

    const { milk, fruit, spec } = categorize(items);

    renderItems("milk-tea-list", milk);
    renderItems("fruit-tea-list", fruit);
    renderItems("specialty-list", spec);

    tickerTrack.innerHTML = items.slice(0, 8)
      .map(i => `<span>${i.name}</span>`).join("");

    boardStatus.textContent = "Menu loaded";
    
  } catch {
    boardStatus.textContent = "Error loading menu";
  }
}

async function loadModifiers() {
  try {
    const res = await fetch("/api/menu-modifiers");
    const items = await res.json();

    const sugar = items.filter(i => i.modifierType === "Sugar Level");
    const ice = items.filter(i => i.modifierType === "Ice Level");
    const toppings = items.filter(i => i.modifierType === "Topping");

    document.getElementById("sugar-options").innerHTML =
      sugar.map(i => `<span class="opt-pill">${i.name}</span>`).join("");

    document.getElementById("ice-options").innerHTML =
      ice.map(i => `<span class="opt-pill">${i.name}</span>`).join("");

    document.getElementById("topping-options").innerHTML =
      toppings.map(i => `<span class="opt-pill">${i.name}</span>`).join("");

  } catch {
    console.log("Modifiers failed to load");
  }
  
}

loadMenu();
loadModifiers();


</script>

</body>

</html>
