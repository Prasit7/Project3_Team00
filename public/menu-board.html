<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Sugar Boba | Menu Board</title>
  <style>
    :root {
      --bg: #0f0a0e;
      --surface: #1a1118;
      --card: #221728;
      --accent1: #e8a2c8;
      --accent2: #f7d49b;
      --accent3: #9bd4c8;
      --text: #f5ece9;
      --muted: #9a8a95;
      --divider: rgba(232, 162, 200, 0.18);
      --error: #f5b7b1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Georgia, serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--divider);
    }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
    }

    .board-header h1 {
      font-size: 2.2rem;
      background: linear-gradient(120deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .meta-pill {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--divider);
      background: rgba(255, 255, 255, 0.04);
    }

    .status-banner {
      padding: 0.9rem 3rem;
      border-bottom: 1px solid var(--divider);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status-banner.error {
      color: var(--error);
    }

    .board-main {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      min-height: calc(100vh - 208px);
    }

    .menu-column {
      padding: 2rem;
      border-right: 1px solid var(--divider);
      background: rgba(255, 255, 255, 0.02);
    }

    .menu-column:last-child {
      border-right: none;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .cat-icon {
      font-size: 1.5rem;
    }

    .menu-column h2 {
      font-size: 1.5rem;
    }

    .item-list {
      list-style: none;
    }

    .menu-item,
    .empty-item {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .empty-item {
      color: var(--muted);
      justify-content: flex-start;
    }

    .item-info {
      min-width: 0;
    }

    .item-name {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .item-desc {
      display: block;
      color: var(--muted);
      margin-top: 0.2rem;
      font-size: 0.9rem;
    }

    .item-price {
      font-size: 1.15rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .board-footer {
      display: flex;
      justify-content: space-around;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1rem;
      background: var(--surface);
      border-top: 1px solid var(--divider);
    }

    .opt-group {
      text-align: center;
    }

    .opt-label {
      margin-bottom: 0.35rem;
      font-weight: 700;
    }

    .opt-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .opt-pill {
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--divider);
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 1100px) {
      .board-main {
        grid-template-columns: 1fr;
      }

      .menu-column {
        border-right: none;
        border-bottom: 1px solid var(--divider);
      }

      .menu-column:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <header class="board-header">
    <div class="header-brand">
      <p class="eyebrow">Artisan Bubble Tea</p>
      <h1>Zero Sugar Boba</h1>
    </div>
    <div class="header-meta">
      <span class="meta-pill" id="clock">--:-- --</span>
      <span class="meta-pill">Live Menu</span>
    </div>
  </header>

  <section class="status-banner" aria-live="polite">
    <p id="board-status">Loading menu from database...</p>
  </section>

  <main class="board-main" aria-label="Menu">
    <section class="menu-column" aria-labelledby="cat-milk-tea">
      <div class="column-header">
        <span class="cat-icon">🧋</span>
        <h2 id="cat-milk-tea">Milk Teas</h2>
      </div>
      <ul class="item-list" id="milk-tea-list">
        <li class="empty-item">Loading items...</li>
      </ul>
    </section>

    <section class="menu-column" aria-labelledby="cat-fruit-tea">
      <div class="column-header">
        <span class="cat-icon">🍓</span>
        <h2 id="cat-fruit-tea">Fruit Teas</h2>
      </div>
      <ul class="item-list" id="fruit-tea-list">
        <li class="empty-item">Loading items...</li>
      </ul>
    </section>

    <section class="menu-column" aria-labelledby="cat-specialty">
      <div class="column-header">
        <span class="cat-icon">🍵</span>
        <h2 id="cat-specialty">Specialty</h2>
      </div>
      <ul class="item-list" id="specialty-list">
        <li class="empty-item">Loading items...</li>
      </ul>
    </section>
  </main>

  <footer class="board-footer" aria-label="Customization options">
    <div class="opt-group">
      <p class="opt-label">Sugar Level</p>
      <div class="opt-pills">
        <span class="opt-pill">0%</span>
        <span class="opt-pill">25%</span>
        <span class="opt-pill">50%</span>
        <span class="opt-pill">75%</span>
        <span class="opt-pill">100%</span>
      </div>
    </div>
    <div class="opt-group">
      <p class="opt-label">Ice Level</p>
      <div class="opt-pills">
        <span class="opt-pill">No Ice</span>
        <span class="opt-pill">Light Ice</span>
        <span class="opt-pill">Regular Ice</span>
      </div>
    </div>
    <div class="opt-group">
      <p class="opt-label">Sizes</p>
      <div class="opt-pills">
        <span class="opt-pill">Medium</span>
        <span class="opt-pill">Large</span>
      </div>
    </div>
  </footer>

  <script>
    const boardStatus = document.getElementById("board-status");
    const boardStatusSection = boardStatus.parentElement;

    const CATEGORY_TARGETS = [
      {
        id: "milk-tea-list",
        title: "Milk Teas",
        matchers: ["milk"],
      },
      {
        id: "fruit-tea-list",
        title: "Fruit Teas",
        matchers: ["fruit", "green tea", "black tea", "oolong", "tea"],
      },
      {
        id: "specialty-list",
        title: "Specialty",
        matchers: [],
      },
    ];

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const ampm = hours >= 12 ? "PM" : "AM";
      hours = hours % 12 || 12;
      document.getElementById("clock").textContent = `${hours}:${minutes} ${ampm}`;
    }

    function formatMoney(value) {
      return `$${Number(value).toFixed(2)}`;
    }

    function buildDescription(item) {
      const parts = [];
      if (item.category) parts.push(item.category);
      parts.push("Available now");
      return parts.join(" · ");
    }

    function renderItems(listId, items) {
      const list = document.getElementById(listId);
      if (!items.length) {
        list.innerHTML = '<li class="empty-item">No items available.</li>';
        return;
      }

      list.innerHTML = items
        .map(
          (item) => `
            <li class="menu-item">
              <div class="item-info">
                <span class="item-name">${item.name}</span>
                <span class="item-desc">${buildDescription(item)}</span>
              </div>
              <span class="item-price">${formatMoney(item.price)}</span>
            </li>
          `
        )
        .join("");
    }

    function categorizeItems(items) {
      const buckets = CATEGORY_TARGETS.map((target) => ({ ...target, items: [] }));

      items.forEach((item) => {
        const category = String(item.category || "").toLowerCase();
        const exactMatch = buckets.find(
          (bucket) => bucket.matchers.length > 0 && bucket.matchers.some((matcher) => category.includes(matcher))
        );

        if (exactMatch) {
          exactMatch.items.push(item);
          return;
        }

        buckets[buckets.length - 1].items.push(item);
      });

      return buckets;
    }

    async function loadMenuBoard() {
      try {
        const response = await fetch("/api/menu-items");
        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const items = await response.json();
        const menuItems = Array.isArray(items) ? items : [];
        const categories = categorizeItems(menuItems);

        categories.forEach((category) => renderItems(category.id, category.items));
        boardStatus.textContent = "Menu items loaded from database.";
        boardStatusSection.classList.remove("error");
      } catch (error) {
        CATEGORY_TARGETS.forEach((category) => {
          renderItems(category.id, []);
        });
        boardStatus.textContent = `Could not load menu from database. ${error.message}`;
        boardStatusSection.classList.add("error");
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadMenuBoard();
  </script>
</body>
</html>
