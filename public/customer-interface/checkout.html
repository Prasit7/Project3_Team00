<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Kiosk - Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="customer-page">
    <section class="page-header">
      <h1 data-i18n="checkoutTitle">Checkout</h1>
      <p data-i18n="checkoutStep">Step 3 of 3: Review the order and complete checkout.</p>
    </section>

    <section class="status-bar" aria-live="polite">
      <p id="checkout-status" data-i18n="checkoutStep">Loading order summary...</p>
    </section>

    <section class="checkout-section" aria-labelledby="checkout-heading">
      <h2 id="checkout-heading" data-i18n="orderSummary">Order Summary</h2>
      <div class="order-box" id="checkout-order-box">
        <p data-i18n="noOrder">No order available yet.</p>
      </div>
      <p class="total-text" id="checkout-total">Total: $0.00</p>
    </section>

    <section class="assistant-section" aria-labelledby="assistant-heading">
      <h2 id="assistant-heading" data-i18n="assistantSpace">Assistant Space</h2>
      <div class="text-box assistant-box">
        <label for="assistant-placeholder" data-i18n="assistantFuture">Future chatbot / assistant</label>
        <input id="assistant-placeholder" name="assistant-placeholder" type="text" placeholder="Reserved for later" data-i18n="assistantReserved" />
      </div>
    </section>

    <section class="page-actions">
      <a class="nav-button" href="customize.html" data-i18n="backToCustomize">Back to Customization</a>
      <a class="nav-button primary-link" href="index.html" data-i18n="startNewOrder">Start New Order</a>
      <button class="nav-button primary-link" id="pay-button" type="button" data-i18n="pay">Pay</button>
    </section>

    <div class="payment-success-overlay is-hidden" id="payment-success-overlay" role="presentation">
      <section class="payment-success-modal" role="dialog" aria-modal="true" aria-labelledby="payment-success-title">
        <h2 id="payment-success-title" data-i18n="paymentSuccessTitle">Payment Successful</h2>
        <p id="payment-success-message">Order is confirmed.</p>
        <p id="payment-success-countdown" data-i18n="autoNewOrderIn">Starting a new order in 15s</p>
        <button class="nav-button primary-link" id="success-new-order-btn" type="button" data-i18n="startNewOrder">
          Start New Order
        </button>
      </section>
    </div>
  </main>

  <script src="../translations.js"></script>
  <script src="../accessibility.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
