<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Kiosk - Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="customer-page">
    <section class="page-header">
      <h1>Checkout</h1>
      <p>Step 3 of 3: Review the order and complete checkout.</p>
    </section>

    <section class="status-bar" aria-live="polite">
      <p id="checkout-status">Loading order summary...</p>
    </section>

    <section class="checkout-section" aria-labelledby="checkout-heading">
      <h2 id="checkout-heading">Order Summary</h2>
      <div class="order-box" id="checkout-order-box">
        <p>No order available yet.</p>
      </div>
      <p class="total-text" id="checkout-total">Total: $0.00</p>
    </section>

    <section class="checkout-section" aria-labelledby="customer-info-heading">
      <h2 id="customer-info-heading">Customer Information</h2>
      <div class="checkout-grid">
        <div class="text-box">
          <label for="customer-name">Name</label>
          <input id="customer-name" name="customer-name" type="text" placeholder="Customer name" />
        </div>

        <div class="text-box">
          <label for="pickup-note">Pickup Note</label>
          <input id="pickup-note" name="pickup-note" type="text" placeholder="Optional note" />
        </div>
      </div>
    </section>

    <section class="assistant-section" aria-labelledby="assistant-heading">
      <h2 id="assistant-heading">Assistant Space</h2>
      <div class="text-box assistant-box">
        <label for="assistant-placeholder">Future chatbot / assistant</label>
        <input id="assistant-placeholder" name="assistant-placeholder" type="text" placeholder="Reserved for later" />
      </div>
    </section>

    <section class="page-actions">
      <a class="nav-button" href="customize.html">Back to Customization</a>
      <a class="nav-button primary-link" href="index.html">Start New Order</a>
      <button class="nav-button primary-link" id="pay-button" type="button">Pay</button>
    </section>
  </main>

  <script src="checkout.js"></script>
</body>
</html>
