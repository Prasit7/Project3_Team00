<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Kiosk - Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="customer-page">
    <section class="page-header">
      <h1>Choose Your Items</h1>
      <p>Step 1 of 3: Select drinks from the menu.</p>
    </section>

    <section class="status-bar" aria-live="polite">
      <p id="customer-status">Loading menu from database...</p>
    </section>

    <section class="category-bar" id="category-bar" aria-label="Menu categories">
    </section>

    <section class="menu-section" aria-label="Menu items">
      <div class="menu-grid" id="menu-grid">
      </div>
    </section>

    <section class="order-section" aria-labelledby="order-heading">
      <h2 id="order-heading">Current Order</h2>
      <div class="order-box" id="selected-item-box">
        <p>No item selected yet.</p>
      </div>
      <p class="total-text" id="selected-item-total">Total: $0.00</p>
    </section>

    <section class="page-actions">
      <a class="nav-button primary-link is-disabled" id="next-customize-link" href="customize.html" aria-disabled="true">Next: Customize Drinks</a>
    </section>
  </main>

  <script src="menu.js"></script>
</body>
</html>
